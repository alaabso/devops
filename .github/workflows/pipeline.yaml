name: CI_PIPELINE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    # 'steps' is now correctly indented under 'build'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Updated to v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20 # Updated to a supported LTS version

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test